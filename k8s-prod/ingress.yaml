apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: geospatial
  namespace: geospatial
  labels:
    app.kubernetes.io/name: geospatial
  annotations:
    # Uncomment for AWS ALB
    # kubernetes.io/ingress.class: alb
    # alb.ingress.kubernetes.io/scheme: internet-facing

    # Uncomment for NGINX Ingress
    # kubernetes.io/ingress.class: nginx
    # nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # Uncomment for GKE
    # kubernetes.io/ingress.class: gce
spec:
  # Uncomment and configure TLS for production
  # tls:
  #   - hosts:
  #       - api.geospatial.example.com
  #     secretName: geospatial-tls
  rules:
    - host: api.geospatial.local  # Change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
