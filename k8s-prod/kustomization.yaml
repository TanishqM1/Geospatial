apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: geospatial

resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - backend-deployment.yaml
  - services.yaml
  - ingress.yaml
  - pdb.yaml
  - networkpolicy.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/version: "1.0.0"

# Image tags - override these for different environments
images:
  - name: osrm/osrm-backend
    newTag: v5.27.1
  - name: geospatial-flask
    newTag: v1.0.0
