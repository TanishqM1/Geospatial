apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: geospatial
  labels:
    app.kubernetes.io/name: geospatial
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: geospatial
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geospatial
        app.kubernetes.io/component: backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: geospatial
                    app.kubernetes.io/component: backend
                topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30

      volumes:
        - name: osrm-data
          persistentVolumeClaim:
            claimName: osrm-data-pvc

      containers:
        # OSRM Backend Container
        - name: osrm
          image: osrm/osrm-backend:v5.27.1
          imagePullPolicy: IfNotPresent
          command:
            - osrm-routed
            - --algorithm
            - mld
            - --max-table-size
            - "10000"
            - /data/british-columbia-251029.osrm
          ports:
            - name: osrm
              containerPort: 5000
              protocol: TCP
          volumeMounts:
            - name: osrm-data
              mountPath: /data
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

        # Flask API Container
        - name: flask
          image: geospatial-flask:v1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: backend-config
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: osrm-data
              mountPath: /data
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
